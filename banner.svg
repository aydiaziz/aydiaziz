<svg width="1500" height="420" viewBox="0 0 1500 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="45%" stop-color="#161b33"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="35%" stop-color="#61DAFB"/>
      <stop offset="70%" stop-color="#0a8a5c"/>
      <stop offset="100%" stop-color="#2496ED"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f3a5f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1f3a5f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0,0 L0,40 M0,0 L40,0" stroke="#1c2440" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1500" height="420" fill="url(#bg)"/>
  <rect width="1500" height="420" fill="url(#grid)" opacity="0.5"/>
  <circle cx="1180" cy="120" r="260" fill="url(#glow)"/>
  <circle cx="250" cy="380" r="200" fill="url(#glow)"/>

  <!-- subtle circuit traces -->
  <g stroke="#26305a" stroke-width="2" fill="none" opacity="0.7">
    <path d="M0,360 L100,360 L140,320 L320,320"/>
    <path d="M0,300 L60,300 L95,265 L230,265"/>
    <path d="M1500,80 L1360,80 L1320,120 L1140,120"/>
    <path d="M1500,150 L1430,150 L1395,185 L1220,185"/>
    <path d="M1500,260 L1450,260 L1420,290 L1300,290"/>
  </g>
  <g fill="#61DAFB">
    <circle cx="140" cy="320" r="4.5"/>
    <circle cx="320" cy="320" r="4.5"/>
    <circle cx="95" cy="265" r="4.5"/>
    <circle cx="1320" cy="120" r="4.5"/>
    <circle cx="1140" cy="120" r="4.5"/>
    <circle cx="1395" cy="185" r="4.5"/>
    <circle cx="1420" cy="290" r="4.5"/>
  </g>

  <!-- accent bar -->
  <rect x="110" y="118" width="7" height="100" rx="3" fill="url(#accent)"/>

  <!-- name -->
  <text x="142" y="172" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="800" fill="#ffffff" letter-spacing="0.5">
    Aziz Aydi
  </text>

  <!-- subtitle -->
  <text x="142" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23" font-weight="400" fill="#9aa5ce">
    Full Stack Developer &amp; DevOps Enthusiast
  </text>

  <!-- divider -->
  <line x1="142" y1="236" x2="700" y2="236" stroke="#26305a" stroke-width="1.5"/>

  <!-- stack pills row 1 -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <rect x="142" y="256" width="96" height="36" rx="18" fill="#092E20"/>
    <text x="190" y="280" fill="#ffffff" text-anchor="middle">Django</text>

    <rect x="250" y="256" width="100" height="36" rx="18" fill="#DD0031"/>
    <text x="300" y="280" fill="#ffffff" text-anchor="middle">Angular</text>

    <rect x="362" y="256" width="68" height="36" rx="18" fill="#00ADD8"/>
    <text x="396" y="280" fill="#ffffff" text-anchor="middle">Go</text>

    <rect x="442" y="256" width="100" height="36" rx="18" fill="#2496ED"/>
    <text x="492" y="280" fill="#ffffff" text-anchor="middle">Docker</text>
  </g>

  <!-- stack pills row 2: devops -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <rect x="142" y="302" width="98" height="36" rx="18" fill="#326CE5"/>
    <text x="191" y="326" fill="#ffffff" text-anchor="middle">K8s</text>

    <rect x="252" y="302" width="120" height="36" rx="18" fill="#D24939"/>
    <text x="312" y="326" fill="#ffffff" text-anchor="middle">CI/CD</text>

    <rect x="384" y="302" width="110" height="36" rx="18" fill="#FF9900"/>
    <text x="439" y="326" fill="#ffffff" text-anchor="middle">Cloud</text>

    <rect x="506" y="302" width="116" height="36" rx="18" fill="#623CE4"/>
    <text x="564" y="326" fill="#ffffff" text-anchor="middle">Terraform</text>
  </g>

  <!-- right side tag -->
  <text x="1370" y="380" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#5a6494" text-anchor="end">
    github.com/aydiaziz
  </text>
</svg>
